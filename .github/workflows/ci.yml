name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ELECTROBUN_LINUX_ARTIFACT_NAME: csv-anonymizer-electrobun-linux-x64-release-bundle

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libwebkit2gtk-4.1-0 \
            libayatana-appindicator3-1 \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libgbm1

      - name: Validate release metadata
        run: bun run release:check

      - name: Type-check
        run: bun run typecheck

      - name: Run unit and integration tests
        run: bun run test

      - name: Build Electrobun app
        run: bun run build

      - name: Run Electrobun smoke
        run: xvfb-run --auto-servernum bun run smoke:electrobun

  package-linux:
    name: Package Linux Electrobun
    needs: test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Linux desktop and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            zstd \
            rpm \
            desktop-file-utils \
            appstream \
            wget \
            libgtk-3-0 \
            libwebkit2gtk-4.1-0 \
            libayatana-appindicator3-1 \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libgbm1

      - name: Install appimagetool
        run: |
          set -euo pipefail
          appimagetool="${RUNNER_TEMP}/appimagetool-x86_64.AppImage"
          wget -O "${appimagetool}" "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x "${appimagetool}"
          echo "APPIMAGETOOL=${appimagetool}" >> "$GITHUB_ENV"
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Build stable Electrobun artifacts
        run: bun run build:stable

      - name: Build dev Electrobun app for smoke
        run: bun run build

      - name: Smoke test Electrobun app
        run: xvfb-run --auto-servernum bun run smoke:electrobun

      - name: Validate Electrobun artifacts
        run: bun run artifacts:electrobun:check

      - name: Build Linux package-manager artifacts
        run: bun run linux:packages

      - name: Validate Linux package metadata
        run: bun run linux:metadata:check

      - name: Validate APT repository generation
        run: bun run apt:repo:check

      - name: Validate APT installer rendering
        run: bun run apt:installer:check

      - name: Sign Linux Electrobun artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DEB_SIGNING_PRIVATE_KEY: ${{ secrets.DEB_SIGNING_PRIVATE_KEY }}
          DEB_SIGNING_KEY_FINGERPRINT: ${{ secrets.DEB_SIGNING_KEY_FINGERPRINT }}
          DEB_SIGNING_KEY_PASSPHRASE: ${{ secrets.DEB_SIGNING_KEY_PASSPHRASE }}
          DEB_SIGNING_PUBLIC_KEY: ${{ vars.DEB_SIGNING_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          missing=()
          [ -n "${DEB_SIGNING_PRIVATE_KEY}" ] || missing+=("DEB_SIGNING_PRIVATE_KEY")
          [ -n "${DEB_SIGNING_KEY_FINGERPRINT}" ] || missing+=("DEB_SIGNING_KEY_FINGERPRINT")
          [ -n "${DEB_SIGNING_KEY_PASSPHRASE}" ] || missing+=("DEB_SIGNING_KEY_PASSPHRASE")
          [ -n "${DEB_SIGNING_PUBLIC_KEY}" ] || missing+=("DEB_SIGNING_PUBLIC_KEY repository variable")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required Linux artifact signing inputs are missing: ${missing[*]}" >&2
            exit 1
          fi

          mapfile -t artifacts < <(find dist/electrobun/artifacts -type f ! -name '*.asc' | sort)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No Electrobun artifacts found under dist/electrobun/artifacts." >&2
            exit 1
          fi

          gnupg_home="$(mktemp -d)"
          verification_home="$(mktemp -d)"
          private_key_file="$(mktemp)"
          public_key_file="$(mktemp)"
          passphrase_file="$(mktemp)"
          cleanup() {
            rm -rf "${gnupg_home}" "${verification_home}"
            rm -f "${private_key_file}" "${public_key_file}" "${passphrase_file}"
          }
          trap cleanup EXIT

          chmod 700 "${gnupg_home}" "${verification_home}"
          chmod 600 "${passphrase_file}"
          export GNUPGHOME="${gnupg_home}"
          echo allow-loopback-pinentry > "${GNUPGHOME}/gpg-agent.conf"
          gpgconf --kill gpg-agent || true

          printf '%s' "${DEB_SIGNING_PRIVATE_KEY}" | base64 --decode > "${private_key_file}"
          printf '%s' "${DEB_SIGNING_PUBLIC_KEY}" | base64 --decode > "${public_key_file}"
          printf '%s' "${DEB_SIGNING_KEY_PASSPHRASE}" > "${passphrase_file}"
          gpg --batch --import "${private_key_file}"

          expected_fingerprint="$(printf '%s' "${DEB_SIGNING_KEY_FINGERPRINT}" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"
          imported_fingerprint="$(gpg --batch --with-colons --fingerprint "${expected_fingerprint}" | awk -F: '$1 == "fpr" { print toupper($10); exit }')"
          if [ "${imported_fingerprint}" != "${expected_fingerprint}" ]; then
            echo "Imported Linux artifact signing key fingerprint did not match DEB_SIGNING_KEY_FINGERPRINT." >&2
            exit 1
          fi

          GNUPGHOME="${verification_home}" gpg --batch --import "${public_key_file}"
          for artifact in "${artifacts[@]}"; do
            signature="${artifact}.asc"
            echo "Signing ${artifact}"
            gpg --batch --yes --pinentry-mode loopback --passphrase-file "${passphrase_file}" \
              --local-user "${expected_fingerprint}" --armor --detach-sign \
              --output "${signature}" "${artifact}"
            GNUPGHOME="${verification_home}" gpg --quiet --batch --trust-model always --verify "${signature}" "${artifact}"
          done

      - name: Upload reusable Linux Electrobun artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ELECTROBUN_LINUX_ARTIFACT_NAME }}
          path: dist/electrobun/artifacts/**
          if-no-files-found: error
          retention-days: 7
