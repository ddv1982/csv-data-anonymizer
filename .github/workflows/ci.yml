name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUST_LINUX_ARTIFACT_NAME: csv-anonymizer-rust-linux-x64-release-bundle

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Rust desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libgtk-3-dev \
            libssl-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: rust-${{ runner.os }}

      - name: Validate release metadata
        run: node scripts/check-release-metadata.mjs

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build Rust workspace
        run: cargo build --workspace

      - name: Smoke test Rust binary
        run: node scripts/rust-smoke.mjs

  package-linux:
    name: Package Linux Rust
    needs: rust
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: rust-linux-package

      - name: Install Linux desktop and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libgtk-3-dev \
            libssl-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            zstd \
            rpm \
            desktop-file-utils \
            appstream \
            wget

      - name: Install appimagetool
        run: |
          set -euo pipefail
          appimagetool="${RUNNER_TEMP}/appimagetool-x86_64.AppImage"
          wget -O "${appimagetool}" "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x "${appimagetool}"
          echo "APPIMAGETOOL=${appimagetool}" >> "$GITHUB_ENV"
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release -p csv-anonymizer-app

      - name: Smoke test release binary
        run: CSV_ANONYMIZER_BINARY=target/release/csv-anonymizer node scripts/rust-smoke.mjs

      - name: Build Linux artifacts
        run: node scripts/package-rust-linux.mjs --skip-build

      - name: Validate Rust artifacts
        run: node scripts/check-rust-artifacts.mjs --platform linux --require-rpm --require-appimage

      - name: Validate Linux package metadata
        run: python3 scripts/validate_linux_package_metadata.py "dist/rust/artifacts/*.deb" "dist/rust/artifacts/*.rpm"

      - name: Validate APT repository generation
        run: node scripts/check-apt-repository.mjs

      - name: Validate APT installer rendering
        run: node scripts/check-apt-installer.mjs

      - name: Upload reusable Linux Rust artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.RUST_LINUX_ARTIFACT_NAME }}
          path: dist/rust/artifacts/**
          if-no-files-found: error
          retention-days: 7
