name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_LINUX_ARTIFACT_NAME: csv-anonymizer-rust-linux-x64-release-bundle
  TAURI_TARGET: x86_64-unknown-linux-gnu
  TAURI_CLI_VERSION: 2.11.4

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-24.04
    outputs:
      run_docs_ci: ${{ steps.filter.outputs.run_docs_ci }}
      run_package_ci: ${{ steps.filter.outputs.run_package_ci }}
      run_rust_ci: ${{ steps.filter.outputs.run_rust_ci }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            run_rust_ci:
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'src-tauri/**'
              - 'frontend/**'
              - 'tests/**'
              - 'build/icons/**'
              - 'package.json'
              - 'scripts/rust-smoke.mjs'
              - 'scripts/check-release-metadata.mjs'
              - 'scripts/check-tauri-prebuilt-frontend.sh'
              - 'scripts/build_frontend_for_tauri.sh'
            run_docs_ci:
              - '.github/workflows/**'
              - 'README.md'
              - 'docs/**'
              - 'package.json'
              - 'scripts/check-docs.mjs'
            run_package_ci:
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'src-tauri/**'
              - 'frontend/**'
              - 'tests/**'
              - 'build/**'
              - 'scripts/**'
              - 'README.md'
              - 'LICENSE'
              - 'CHANGELOG.md'
              - 'package.json'
              - 'knip.json'

  docs:
    name: Docs
    needs: changes
    if: needs.changes.outputs.run_docs_ci == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'

      - name: Validate documented commands
        run: npm run docs:check

  rust:
    name: Rust ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.run_rust_ci == 'true' || needs.changes.outputs.run_package_ci == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26]

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06-30)

      - name: Install Linux Tauri desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            pkg-config \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (post-v2.9.1, 2026-03-12)
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target
          key: rust-${{ runner.os }}

      - name: Validate frontend and Rust build
        uses: ./.github/actions/validate-build

  package-linux:
    name: Package Linux Rust
    needs: [changes, rust]
    if: |
      always() &&
      needs.changes.outputs.run_package_ci == 'true' &&
      needs.rust.result == 'success'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06-30)
        with:
          targets: ${{ env.TAURI_TARGET }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (post-v2.9.1, 2026-03-12)
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target
          key: rust-linux-package

      - name: Install Linux Tauri and packaging dependencies
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            pkg-config \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            zstd \
            rpm \
            rpm2cpio \
            libarchive-tools \
            desktop-file-utils \
            appstream

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run frontend:build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "=${TAURI_CLI_VERSION}"

      - name: Build Linux artifacts
        env:
          CSV_ANONYMIZER_USE_PREBUILT_FRONTEND: '1'
        run: node scripts/package-tauri-linux.mjs

      - name: Validate Rust artifacts
        run: node scripts/check-rust-artifacts.mjs --platform linux --require-rpm --require-appimage

      - name: Validate Linux package metadata
        run: |
          set -euo pipefail
          set +e
          npm run linux:metadata:check -- \
            --json-report linux-package-metadata-report.json
          validator_status=$?
          set -e
          if [ -f linux-package-metadata-report.json ]; then
            node scripts/write-linux-metadata-summary.mjs linux-package-metadata-report.json
          fi
          exit "${validator_status}"

      - name: Validate APT repository generation
        run: node scripts/check-apt-repository.mjs

      - name: Validate APT installer rendering
        run: node scripts/check-apt-installer.mjs

      - name: Upload reusable Linux Rust artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.RUST_LINUX_ARTIFACT_NAME }}
          path: dist/rust/artifacts/**
          if-no-files-found: error
          retention-days: 7
