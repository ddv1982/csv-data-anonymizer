name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release metadata
        run: pnpm run release:check -- --expected-tag "${{ github.ref_name }}"

  create-release:
    name: Create Draft Release
    needs: validate-release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract changelog notes
        run: pnpm run release:check -- --expected-tag "${{ github.ref_name }}" --write-notes release-notes.md

      - name: Create or refresh draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "CSV Anonymizer ${{ github.ref_name }}" \
              --notes-file release-notes.md \
              --draft=true \
              --prerelease=false
          else
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "CSV Anonymizer ${{ github.ref_name }}" \
              --notes-file release-notes.md \
              --draft \
              --verify-tag \
              --latest
          fi

  build-macos-release:
    name: Build macOS ${{ matrix.arch }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
          - arch: x64
            runner: macos-26-intel

    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
      ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
      ELECTROBUN_APPLEAPIKEY_BASE64: ${{ secrets.APPLE_API_KEY }}
      ELECTROBUN_APPLEAPIKEY: ${{ secrets.APPLE_API_KEY_ID }}
      ELECTROBUN_APPLEAPIISSUER: ${{ secrets.APPLE_API_ISSUER }}
      ELECTROBUN_CODESIGN: '1'
      ELECTROBUN_NOTARIZE: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Apple signing environment
        run: |
          set -euo pipefail

          missing=()
          [ -n "$CSC_LINK" ] || missing+=("CSC_LINK")
          [ -n "$CSC_KEY_PASSWORD" ] || missing+=("CSC_KEY_PASSWORD")
          [ -n "$ELECTROBUN_DEVELOPER_ID" ] || missing+=("ELECTROBUN_DEVELOPER_ID")
          [ -n "$ELECTROBUN_APPLEAPIKEY_BASE64" ] || missing+=("APPLE_API_KEY")
          [ -n "$ELECTROBUN_APPLEAPIKEY" ] || missing+=("APPLE_API_KEY_ID")
          [ -n "$ELECTROBUN_APPLEAPIISSUER" ] || missing+=("APPLE_API_ISSUER")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required macOS release secrets are missing: ${missing[*]}" >&2
            exit 1
          fi

          certificate_path="${RUNNER_TEMP}/developer-id.p12"
          keychain_path="${RUNNER_TEMP}/electrobun-signing.keychain-db"
          keychain_password="$(uuidgen)"
          api_key_path="${RUNNER_TEMP}/AuthKey_${ELECTROBUN_APPLEAPIKEY}.p8"

          printf '%s' "$CSC_LINK" | base64 --decode > "$certificate_path"
          printf '%s' "$ELECTROBUN_APPLEAPIKEY_BASE64" | base64 --decode > "$api_key_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          chmod 600 "$api_key_path"
          echo "ELECTROBUN_APPLEAPIKEYPATH=${api_key_path}" >> "$GITHUB_ENV"

      - name: Validate release metadata
        run: pnpm run release:check -- --expected-tag "${{ github.ref_name }}"

      - name: Build signed and notarized Electrobun artifacts
        run: pnpm run build:stable

      - name: Validate Electrobun artifacts
        run: pnpm run artifacts:electrobun:check

      - name: Verify macOS signing and notarization
        run: |
          set -euo pipefail

          app_path="$(find dist/electrobun/build -type d -name "CSV Anonymizer.app" -prune -print | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "Could not find packaged CSV Anonymizer.app under dist/electrobun/build." >&2
            find dist/electrobun/build -maxdepth 4 -print >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          spctl --assess --verbose --type exec "$app_path"

          while IFS= read -r dmg; do
            xcrun stapler validate "$dmg"
            codesign --verify --verbose=2 "$dmg"
          done < <(find dist/electrobun/artifacts -type f -name '*.dmg' | sort)

      - name: Upload macOS release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: dist/electrobun/artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-release:
    name: Build Linux x64
    needs: create-release
    runs-on: ubuntu-24.04

    env:
      DEB_SIGNING_PRIVATE_KEY: ${{ secrets.DEB_SIGNING_PRIVATE_KEY }}
      DEB_SIGNING_KEY_FINGERPRINT: ${{ secrets.DEB_SIGNING_KEY_FINGERPRINT }}
      DEB_SIGNING_KEY_PASSPHRASE: ${{ secrets.DEB_SIGNING_KEY_PASSPHRASE }}
      DEB_SIGNING_PUBLIC_KEY: ${{ vars.DEB_SIGNING_PUBLIC_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux desktop and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            zstd \
            rpm \
            desktop-file-utils \
            appstream \
            wget \
            libgtk-3-0 \
            libwebkit2gtk-4.1-0 \
            libayatana-appindicator3-1 \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libgbm1

      - name: Install appimagetool
        run: |
          set -euo pipefail
          appimagetool="${RUNNER_TEMP}/appimagetool-x86_64.AppImage"
          wget -O "${appimagetool}" "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x "${appimagetool}"
          echo "APPIMAGETOOL=${appimagetool}" >> "$GITHUB_ENV"
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Validate release metadata
        run: pnpm run release:check -- --expected-tag "${{ github.ref_name }}"

      - name: Build stable Electrobun artifacts
        run: pnpm run build:stable

      - name: Smoke test Electrobun app
        run: xvfb-run --auto-servernum pnpm run smoke:electrobun

      - name: Validate Electrobun artifacts
        run: pnpm run artifacts:electrobun:check

      - name: Build Linux package-manager artifacts
        run: pnpm run linux:packages

      - name: Validate Linux package metadata
        run: pnpm run linux:metadata:check

      - name: Prepare Linux signing environment
        run: |
          set -euo pipefail

          missing=()
          [ -n "${DEB_SIGNING_PRIVATE_KEY}" ] || missing+=("DEB_SIGNING_PRIVATE_KEY")
          [ -n "${DEB_SIGNING_KEY_FINGERPRINT}" ] || missing+=("DEB_SIGNING_KEY_FINGERPRINT")
          [ -n "${DEB_SIGNING_KEY_PASSPHRASE}" ] || missing+=("DEB_SIGNING_KEY_PASSPHRASE")
          [ -n "${DEB_SIGNING_PUBLIC_KEY}" ] || missing+=("DEB_SIGNING_PUBLIC_KEY repository variable")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required Linux signing inputs are missing: ${missing[*]}" >&2
            exit 1
          fi

          gnupg_home="${RUNNER_TEMP}/linux-signing-gnupg"
          verification_home="${RUNNER_TEMP}/linux-signing-verify-gnupg"
          private_key_file="${RUNNER_TEMP}/linux-signing-private-key.asc"
          public_key_file="${RUNNER_TEMP}/linux-signing-public-key.asc"
          passphrase_file="${RUNNER_TEMP}/linux-signing-passphrase"

          rm -rf "${gnupg_home}" "${verification_home}"
          mkdir -p "${gnupg_home}" "${verification_home}"
          chmod 700 "${gnupg_home}" "${verification_home}"

          printf '%s' "${DEB_SIGNING_PRIVATE_KEY}" | base64 --decode > "${private_key_file}"
          printf '%s' "${DEB_SIGNING_PUBLIC_KEY}" | base64 --decode > "${public_key_file}"
          printf '%s' "${DEB_SIGNING_KEY_PASSPHRASE}" > "${passphrase_file}"
          chmod 600 "${passphrase_file}"

          export GNUPGHOME="${gnupg_home}"
          echo allow-loopback-pinentry > "${GNUPGHOME}/gpg-agent.conf"
          gpgconf --kill gpg-agent || true
          gpg --batch --import "${private_key_file}"

          expected_fingerprint="$(printf '%s' "${DEB_SIGNING_KEY_FINGERPRINT}" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"
          imported_fingerprint="$(gpg --batch --with-colons --fingerprint "${expected_fingerprint}" | awk -F: '$1 == "fpr" { print toupper($10); exit }')"
          if [ "${imported_fingerprint}" != "${expected_fingerprint}" ]; then
            echo "Imported Linux signing key fingerprint did not match DEB_SIGNING_KEY_FINGERPRINT." >&2
            exit 1
          fi

          GNUPGHOME="${verification_home}" gpg --batch --import "${public_key_file}"

          echo "LINUX_GNUPGHOME=${gnupg_home}" >> "$GITHUB_ENV"
          echo "LINUX_VERIFICATION_GNUPGHOME=${verification_home}" >> "$GITHUB_ENV"
          echo "LINUX_GPG_FINGERPRINT=${expected_fingerprint}" >> "$GITHUB_ENV"
          echo "LINUX_GPG_PASSPHRASE_FILE=${passphrase_file}" >> "$GITHUB_ENV"

      - name: Build signed APT repository
        run: |
          set -euo pipefail

          python3 scripts/build_apt_repository.py "dist/electrobun/artifacts/*.deb" \
            --output dist/electrobun/apt-pages/apt \
            --repository-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/apt/" \
            --gpg-key "${LINUX_GPG_FINGERPRINT}" \
            --gpg-homedir "${LINUX_GNUPGHOME}" \
            --gpg-passphrase-file "${LINUX_GPG_PASSPHRASE_FILE}" \
            --public-key-out dist/electrobun/artifacts/csv-anonymizer-archive-keyring.pgp \
            --setup-package-out dist/electrobun/artifacts/csv-anonymizer-repository-setup_1.0_all.deb \
            --clean

      - name: Sign repository setup checksum
        run: |
          set -euo pipefail

          setup_deb="dist/electrobun/artifacts/csv-anonymizer-repository-setup_1.0_all.deb"
          setup_sha256="${setup_deb}.sha256"
          setup_sha256_sig="${setup_sha256}.asc"

          (cd "$(dirname "${setup_deb}")" && sha256sum "$(basename "${setup_deb}")" > "$(basename "${setup_sha256}")")
          GNUPGHOME="${LINUX_GNUPGHOME}" gpg --batch --yes --pinentry-mode loopback \
            --passphrase-file "${LINUX_GPG_PASSPHRASE_FILE}" \
            --local-user "${LINUX_GPG_FINGERPRINT}" --armor --detach-sign \
            --output "${setup_sha256_sig}" "${setup_sha256}"
          GNUPGHOME="${LINUX_VERIFICATION_GNUPGHOME}" gpg --batch --verify "${setup_sha256_sig}" "${setup_sha256}"

      - name: Sign Linux release artifacts
        run: |
          set -euo pipefail

          mapfile -t artifacts < <(find dist/electrobun/artifacts -type f ! -name '*.asc' | sort)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No Linux release artifacts found under dist/electrobun/artifacts." >&2
            exit 1
          fi

          for artifact in "${artifacts[@]}"; do
            signature="${artifact}.asc"
            echo "Signing ${artifact}"
            GNUPGHOME="${LINUX_GNUPGHOME}" gpg --batch --yes --pinentry-mode loopback \
              --passphrase-file "${LINUX_GPG_PASSPHRASE_FILE}" \
              --local-user "${LINUX_GPG_FINGERPRINT}" --armor --detach-sign \
              --output "${signature}" "${artifact}"
            GNUPGHOME="${LINUX_VERIFICATION_GNUPGHOME}" gpg --batch --verify "${signature}" "${artifact}"
          done

      - name: Upload Linux release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: dist/electrobun/artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APT repository pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/electrobun/apt-pages

  build-windows-release:
    name: Build Windows x64
    needs: create-release
    runs-on: windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release metadata
        run: pnpm run release:check -- --expected-tag "${{ github.ref_name }}"

      - name: Build stable Electrobun artifacts
        run: pnpm run build:stable

      - name: Smoke test Electrobun app
        run: pnpm run smoke:electrobun

      - name: Validate Electrobun artifacts
        run: pnpm run artifacts:electrobun:check

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: dist/electrobun/artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-apt-repository:
    name: Publish APT Repository
    needs: build-linux-release
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy APT repository to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-release:
    name: Publish Release
    needs: [create-release, build-macos-release, build-linux-release, build-windows-release, publish-apt-repository]
    runs-on: ubuntu-24.04

    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --prerelease=false
