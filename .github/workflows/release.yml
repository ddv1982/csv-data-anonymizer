name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  TAURI_CLI_VERSION: 2.11.4

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06-30)

      - name: Install Linux Tauri desktop dependencies
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            pkg-config \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Validate frontend and Rust build
        uses: ./.github/actions/validate-build
        with:
          expected-tag: ${{ github.ref_name }}

  create-release:
    name: Create Draft Release
    needs: validate-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'

      - name: Extract changelog notes
        run: node scripts/check-release-metadata.mjs --expected-tag "${{ github.ref_name }}" --write-notes release-notes.md

      - name: Create or refresh draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            is_draft="$(gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json isDraft --jq '.isDraft')"
            if [ "${is_draft}" != "true" ]; then
              echo "Release ${{ github.ref_name }} is already published; refusing to flip it back to draft." >&2
              echo "If you really need to rebuild this release, delete it (or move the tag to a new version) and re-run the workflow." >&2
              exit 1
            fi
            gh release edit "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "CSV Anonymizer ${{ github.ref_name }}" \
              --notes-file release-notes.md \
              --draft=true \
              --prerelease=false
          else
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "CSV Anonymizer ${{ github.ref_name }}" \
              --notes-file release-notes.md \
              --draft \
              --verify-tag \
              --latest
          fi

  build-macos-release:
    name: Build macOS ${{ matrix.arch }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
          - arch: x64
            runner: macos-26-intel

    # Signing secrets (CSC_LINK, CSC_KEY_PASSWORD, APPLE_API_KEY*) are scoped to
    # the individual steps that need them so third-party actions never see them.
    env:
      MACOS_DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID || secrets.ELECTROBUN_DEVELOPER_ID }}
      MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID || secrets.ELECTROBUN_TEAMID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06-30)

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (post-v2.9.1, 2026-03-12)
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target
          key: rust-macos-${{ matrix.arch }}

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Validate release metadata
        run: node scripts/check-release-metadata.mjs --expected-tag "${{ github.ref_name }}"

      - name: Build frontend
        run: npm run frontend:build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "=${TAURI_CLI_VERSION}"

      - name: Build macOS Tauri app bundle
        env:
          CSV_ANONYMIZER_USE_PREBUILT_FRONTEND: '1'
        run: |
          set -euo pipefail
          pushd src-tauri
          cargo tauri build --bundles app
          popd

          rm -rf "dist/rust/build/CSV Anonymizer.app"
          mkdir -p "dist/rust/build" "dist/rust/artifacts"
          cp -R "target/release/bundle/macos/CSV Anonymizer.app" "dist/rust/build/CSV Anonymizer.app"

      - name: Prepare Apple signing environment
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          missing=()
          [ -n "$CSC_LINK" ] || missing+=("CSC_LINK")
          [ -n "$CSC_KEY_PASSWORD" ] || missing+=("CSC_KEY_PASSWORD")
          [ -n "$APPLE_API_KEY_BASE64" ] || missing+=("APPLE_API_KEY")
          [ -n "$APPLE_API_KEY_ID" ] || missing+=("APPLE_API_KEY_ID")
          [ -n "$APPLE_API_ISSUER" ] || missing+=("APPLE_API_ISSUER")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required macOS release secrets are missing: ${missing[*]}" >&2
            exit 1
          fi

          certificate_path="${RUNNER_TEMP}/developer-id.p12"
          keychain_path="${RUNNER_TEMP}/csv-anonymizer-signing.keychain-db"
          keychain_password="$(uuidgen)"
          api_key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"

          printf '%s' "$CSC_LINK" | base64 --decode > "$certificate_path"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$api_key_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          if [ -z "${MACOS_DEVELOPER_ID}" ]; then
            MACOS_DEVELOPER_ID="$(security find-identity -v -p codesigning "$keychain_path" | awk -F'"' '/Developer ID Application/ { print $2; exit }')"
          fi

          if [ -z "${MACOS_DEVELOPER_ID}" ]; then
            MACOS_DEVELOPER_ID="$(security find-identity -v -p codesigning "$keychain_path" | awk -F'"' '/"/ { print $2; exit }')"
          fi

          if [ -z "${MACOS_DEVELOPER_ID}" ]; then
            echo "Could not derive a codesigning identity from CSC_LINK." >&2
            security find-identity -v -p codesigning "$keychain_path" >&2 || true
            exit 1
          fi

          if [ -z "${MACOS_TEAM_ID}" ] && [[ "${MACOS_DEVELOPER_ID}" =~ \(([A-Z0-9]{10})\)$ ]]; then
            MACOS_TEAM_ID="${BASH_REMATCH[1]}"
          fi

          chmod 600 "$api_key_path"
          echo "MACOS_DEVELOPER_ID=${MACOS_DEVELOPER_ID}" >> "$GITHUB_ENV"
          if [ -n "${MACOS_TEAM_ID}" ]; then
            echo "MACOS_TEAM_ID=${MACOS_TEAM_ID}" >> "$GITHUB_ENV"
          fi
          echo "APPLE_API_KEY_PATH=${api_key_path}" >> "$GITHUB_ENV"

      - name: Sign and notarize macOS app bundle
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          app_path="dist/rust/build/CSV Anonymizer.app"
          app_zip="${RUNNER_TEMP}/csv-anonymizer-app.zip"

          codesign --force --deep --timestamp --options runtime \
            --entitlements build/entitlements.mac.plist \
            --sign "${MACOS_DEVELOPER_ID}" \
            "${app_path}"
          codesign --verify --deep --strict --verbose=2 "${app_path}"

          ditto -c -k --keepParent "${app_path}" "${app_zip}"
          bash scripts/notarize-macos-artifact.sh "${app_zip}"
          xcrun stapler staple "${app_path}"
          xcrun stapler validate "${app_path}"
          spctl --assess --verbose --type exec "${app_path}"

      - name: Build, sign, and notarize macOS DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          MACOS_ARCH="${{ matrix.arch }}" node scripts/package-rust-macos.mjs --skip-build --dmg-only
          # Derive the DMG name from the same module the packaging script uses
          # so the filename pattern and arch mapping live in one place.
          dmg="dist/rust/artifacts/$(MACOS_ARCH="${{ matrix.arch }}" node --input-type=module -e "
            import { readFileSync } from 'node:fs'
            import { macosDmgName } from './scripts/command-utils.mjs'
            const version = JSON.parse(readFileSync('package.json', 'utf8')).version
            console.log(macosDmgName(version, process.env.MACOS_ARCH))
          ")"

          codesign --force --timestamp --sign "${MACOS_DEVELOPER_ID}" "${dmg}"
          codesign --verify --verbose=2 "${dmg}"
          bash scripts/notarize-macos-artifact.sh "${dmg}"
          xcrun stapler staple "${dmg}"
          xcrun stapler validate "${dmg}"
          spctl --assess --verbose --type open --context context:primary-signature "${dmg}"

      - name: Validate macOS artifacts
        run: node scripts/check-rust-artifacts.mjs --platform macos --require-dmg

      - name: Upload macOS release assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: dist/rust/artifacts/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-release:
    name: Build Linux x64
    needs: create-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pages: write
      id-token: write

    # DEB signing inputs are scoped to the "Prepare Linux signing environment"
    # step (the only step that reads them) so third-party actions never see them.

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06-30)
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (post-v2.9.1, 2026-03-12)
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target
          key: rust-linux-release

      - name: Install Linux Tauri and packaging dependencies
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            pkg-config \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            zstd \
            rpm \
            rpm2cpio \
            libarchive-tools \
            desktop-file-utils \
            appstream \
            gnupg

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Validate release metadata
        run: node scripts/check-release-metadata.mjs --expected-tag "${{ github.ref_name }}"

      - name: Build frontend
        run: npm run frontend:build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "=${TAURI_CLI_VERSION}"

      - name: Build Linux artifacts
        env:
          CSV_ANONYMIZER_USE_PREBUILT_FRONTEND: '1'
          TAURI_TARGET: x86_64-unknown-linux-gnu
        run: node scripts/package-tauri-linux.mjs

      - name: Validate Linux artifacts
        run: node scripts/check-rust-artifacts.mjs --platform linux --require-rpm --require-appimage

      - name: Validate Linux package metadata
        run: |
          set +e
          python3 scripts/validate_linux_package_metadata.py \
            "dist/rust/artifacts/*.deb" \
            "dist/rust/artifacts/*.rpm" \
            --json-report linux-package-metadata-report.json
          validator_status=$?
          set -e
          if [ -f linux-package-metadata-report.json ]; then
            node scripts/write-linux-metadata-summary.mjs linux-package-metadata-report.json
          fi
          exit "${validator_status}"

      - name: Prepare Linux signing environment
        env:
          DEB_SIGNING_PRIVATE_KEY: ${{ secrets.DEB_SIGNING_PRIVATE_KEY }}
          DEB_SIGNING_KEY_FINGERPRINT: ${{ secrets.DEB_SIGNING_KEY_FINGERPRINT }}
          DEB_SIGNING_KEY_PASSPHRASE: ${{ secrets.DEB_SIGNING_KEY_PASSPHRASE }}
          DEB_SIGNING_PUBLIC_KEY: ${{ vars.DEB_SIGNING_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          missing=()
          [ -n "${DEB_SIGNING_PRIVATE_KEY}" ] || missing+=("DEB_SIGNING_PRIVATE_KEY")
          [ -n "${DEB_SIGNING_KEY_FINGERPRINT}" ] || missing+=("DEB_SIGNING_KEY_FINGERPRINT")
          [ -n "${DEB_SIGNING_KEY_PASSPHRASE}" ] || missing+=("DEB_SIGNING_KEY_PASSPHRASE")
          [ -n "${DEB_SIGNING_PUBLIC_KEY}" ] || missing+=("DEB_SIGNING_PUBLIC_KEY repository variable")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required Linux signing inputs are missing: ${missing[*]}" >&2
            exit 1
          fi

          gnupg_home="${RUNNER_TEMP}/linux-signing-gnupg"
          verification_home="${RUNNER_TEMP}/linux-signing-verify-gnupg"
          private_key_file="${RUNNER_TEMP}/linux-signing-private-key.asc"
          public_key_file="${RUNNER_TEMP}/linux-signing-public-key.asc"
          passphrase_file="${RUNNER_TEMP}/linux-signing-passphrase"

          rm -rf "${gnupg_home}" "${verification_home}"
          mkdir -p "${gnupg_home}" "${verification_home}"
          chmod 700 "${gnupg_home}" "${verification_home}"

          printf '%s' "${DEB_SIGNING_PRIVATE_KEY}" | base64 --decode > "${private_key_file}"
          printf '%s' "${DEB_SIGNING_PUBLIC_KEY}" | base64 --decode > "${public_key_file}"
          printf '%s' "${DEB_SIGNING_KEY_PASSPHRASE}" > "${passphrase_file}"
          chmod 600 "${passphrase_file}"

          export GNUPGHOME="${gnupg_home}"
          echo allow-loopback-pinentry > "${GNUPGHOME}/gpg-agent.conf"
          gpgconf --kill gpg-agent || true
          gpg --batch --import "${private_key_file}"

          expected_fingerprint="$(printf '%s' "${DEB_SIGNING_KEY_FINGERPRINT}" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"
          imported_fingerprint="$(gpg --batch --with-colons --fingerprint "${expected_fingerprint}" | awk -F: '$1 == "fpr" { print toupper($10); exit }')"
          if [ "${imported_fingerprint}" != "${expected_fingerprint}" ]; then
            echo "Imported Linux signing key fingerprint did not match DEB_SIGNING_KEY_FINGERPRINT." >&2
            exit 1
          fi

          GNUPGHOME="${verification_home}" gpg --batch --import "${public_key_file}"

          echo "LINUX_GNUPGHOME=${gnupg_home}" >> "$GITHUB_ENV"
          echo "LINUX_VERIFICATION_GNUPGHOME=${verification_home}" >> "$GITHUB_ENV"
          echo "LINUX_GPG_FINGERPRINT=${expected_fingerprint}" >> "$GITHUB_ENV"
          echo "LINUX_GPG_PASSPHRASE_FILE=${passphrase_file}" >> "$GITHUB_ENV"

      - name: Build signed APT repository
        run: |
          set -euo pipefail

          python3 scripts/build_apt_repository.py "dist/rust/artifacts/*.deb" \
            --output dist/rust/apt-pages/apt \
            --repository-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/apt/" \
            --gpg-key "${LINUX_GPG_FINGERPRINT}" \
            --gpg-homedir "${LINUX_GNUPGHOME}" \
            --gpg-passphrase-file "${LINUX_GPG_PASSPHRASE_FILE}" \
            --public-key-out dist/rust/artifacts/csv-anonymizer-archive-keyring.pgp \
            --setup-package-out dist/rust/artifacts/csv-anonymizer-repository-setup_1.0_all.deb \
            --clean
          cp dist/rust/artifacts/csv-anonymizer-archive-keyring.pgp \
            dist/rust/apt-pages/apt/csv-anonymizer-archive-keyring.pgp

      - name: Sign repository setup checksum
        run: bash scripts/sign-linux-checksums.sh --setup-package

      - name: Sign direct Linux installer checksums
        run: bash scripts/sign-linux-checksums.sh --direct-installers

      - name: Stage APT repository installer
        run: bash scripts/stage-apt-installer-assets.sh

      - name: Stage public APT installer assets
        run: bash scripts/stage-apt-installer-assets.sh --stage-public

      - name: Upload Linux release assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            dist/rust/artifacts/csv-anonymizer-*.rpm
            dist/rust/artifacts/csv-anonymizer-*.rpm.sha256
            dist/rust/artifacts/csv-anonymizer-*.rpm.sha256.asc
            dist/rust/artifacts/*.AppImage
            dist/rust/artifacts/*.AppImage.sha256
            dist/rust/artifacts/*.AppImage.sha256.asc
            dist/rust/artifacts/csv-anonymizer_*.deb
            dist/rust/artifacts/csv-anonymizer_*.deb.sha256
            dist/rust/artifacts/csv-anonymizer_*.deb.sha256.asc
            dist/rust/artifacts/csv-anonymizer-repository-setup_*.deb
            dist/rust/artifacts/csv-anonymizer-repository-setup_*.deb.sha256
            dist/rust/artifacts/csv-anonymizer-repository-setup_*.deb.sha256.asc
            dist/rust/artifacts/csv-anonymizer-archive-keyring.pgp
            dist/rust/artifacts/install-apt-repo.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload APT repository pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist/rust/apt-pages

  publish-apt-repository:
    name: Publish APT Repository
    # Gate APT publication on every build job so a failed macOS build (which
    # leaves the GitHub release as an unpublishable draft) cannot let the APT
    # channel ship a .deb that the release itself never publishes.
    needs: [build-macos-release, build-linux-release]
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy APT repository to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  publish-release:
    name: Publish Release
    needs: [create-release, build-macos-release, build-linux-release, publish-apt-repository]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --prerelease=false
