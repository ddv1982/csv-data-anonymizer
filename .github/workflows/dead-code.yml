name: Dead Code And Dependency Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '23 5 * * 1'

permissions:
  contents: read

concurrency:
  group: dead-code-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06-30)

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Audit Rust dependencies
        run: npm run cargo:audit:required

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked --version 0.9.2

      - name: Check required dead-code gates
        run: npm run deadcode:required
